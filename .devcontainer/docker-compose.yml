version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/var/www/html:cached
    command: sleep infinity
    depends_on:
      - pgsql
      - redis

  pgsql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: emporio_digital
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pgsql-data:
