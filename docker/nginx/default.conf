upstream php-fpm {
    server laravel.test:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name kartenant.test *.kartenant.test;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kartenant.test *.kartenant.test;
    
    root /var/www/html/public;
    index index.php index.html;
    charset utf-8;

    # Configuración SSL
    ssl_certificate /var/www/html/docker/nginx/ssl/kartenant.test.crt;
    ssl_certificate_key /var/www/html/docker/nginx/ssl/kartenant.test.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' http: https: ws: wss: http://localhost:5173 http://172.18.0.4:5173; style-src 'self' 'unsafe-inline' http: https:; connect-src 'self' http: https: ws: wss: http://localhost:5173 http://172.18.0.4:5173;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS on;
    }

    # Ocultar archivos sensibles
    location ~ /\.(?!well-known).* {
        deny all;
    }
}