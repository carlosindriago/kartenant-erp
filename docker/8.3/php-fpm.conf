[global]
daemonize = no
error_log = /dev/null
log_level = warning

[www]
user = sail
group = sail
listen = 0.0.0.0:9000
listen.backlog = 511
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 35
pm.max_requests = 500
access.log = /dev/null
clear_env = no
catch_workers_output = yes
security.limit_extensions = .php .php3 .php4 .php5 .php7