[www]
user = sail
group = sail
listen = 9000

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Deshabilitar logs que causan problemas de permisos
; La directiva error_log va en la configuración global de PHP-FPM, no aquí

; Redirigir salida de workers
catch_workers_output = yes
clear_env = no